name: Test Poetry installation with plugins
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "1.8.3"
          plugins: "poetry-plugin-export"
      - name: Assert Poetry is installed
        run: |
          echo "Checking poetry is available..."
          if ! command -v poetry &> /dev/null; then
            echo "FAIL: poetry command not found"
            exit 1
          fi
          echo "PASS: poetry is installed"
      - name: Assert plugin is installed
        run: |
          echo "Checking poetry-plugin-export is installed..."
          PLUGINS=$(poetry self show plugins 2>&1 || true)
          echo "plugins output: $PLUGINS"
          if ! echo "$PLUGINS" | grep -q "poetry-plugin-export"; then
            echo "FAIL: poetry-plugin-export not found in installed plugins"
            exit 1
          fi
          echo "PASS: poetry-plugin-export is installed"
