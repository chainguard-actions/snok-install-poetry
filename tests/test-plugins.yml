name: Test Poetry installation with plugins
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "1.8.3"
          plugins: "poetry-plugin-export"
      - name: Assert Poetry is installed and plugin is available
        run: |
          echo "Checking Poetry installation with plugin..."
          if ! command -v poetry &> /dev/null; then
            echo "FAIL: poetry command not found"
            exit 1
          fi
          POETRY_VERSION=$(poetry --version)
          echo "actual: $POETRY_VERSION"
          if [[ "$POETRY_VERSION" != *"1.8.3"* ]]; then
            echo "FAIL: expected Poetry 1.8.3, got: $POETRY_VERSION"
            exit 1
          fi
          echo "Checking that poetry-plugin-export is installed..."
          PLUGINS=$(poetry self show plugins 2>&1)
          echo "plugins: $PLUGINS"
          if [[ "$PLUGINS" != *"poetry-plugin-export"* ]]; then
            echo "FAIL: poetry-plugin-export not found in installed plugins"
            exit 1
          fi
          echo "PASS"
