name: Test Poetry installation with installation-arguments
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "1.8.3"
          installation-arguments: "--force"
      - name: Assert Poetry is installed
        run: |
          echo "Checking poetry is available after install with --force..."
          if ! command -v poetry &> /dev/null; then
            echo "FAIL: poetry command not found"
            exit 1
          fi
          VERSION=$(poetry --version)
          echo "actual: $VERSION"
          if ! echo "$VERSION" | grep -q "1.8.3"; then
            echo "FAIL: expected poetry version 1.8.3, got: $VERSION"
            exit 1
          fi
          echo "PASS"
