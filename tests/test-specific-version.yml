name: Test specific Poetry version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: "1.8.0"
      - name: Assert Poetry version matches
        run: |
          echo "Checking poetry version..."
          POETRY_VERSION=$(poetry --version 2>&1)
          echo "actual: $POETRY_VERSION"
          if ! echo "$POETRY_VERSION" | grep -q "1.8.0"; then
            echo "FAIL: expected Poetry version 1.8.0, got: $POETRY_VERSION"
            exit 1
          fi
          echo "PASS: correct Poetry version installed"
