name: Test Poetry virtualenvs-in-project configuration
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: latest
          virtualenvs-create: "true"
          virtualenvs-in-project: "true"
      - name: Assert virtualenvs.in-project is true
        run: |
          config="$(poetry config virtualenvs.in-project)"
          echo "virtualenvs.in-project: $config"
          if [ "$config" != "true" ]; then
            echo "FAIL: expected virtualenvs.in-project=true, got $config"
            exit 1
          fi
          echo "PASS"
