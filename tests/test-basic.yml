name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: latest
      - name: Assert poetry is installed
        run: |
          echo "Checking poetry is available..."
          if ! command -v poetry &> /dev/null; then
            echo "FAIL: poetry command not found"
            exit 1
          fi
          echo "PASS: poetry is installed"
          poetry --version
