name: Test basic Poetry installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          version: latest
      - name: Assert Poetry is installed
        run: |
          echo "Checking poetry is available..."
          if ! command -v poetry &>/dev/null; then
            echo "FAIL: poetry command not found"
            exit 1
          fi
          echo "PASS: poetry is installed"
          poetry --version
      - name: Assert virtualenvs.create is true by default
        run: |
          config="$(poetry config virtualenvs.create)"
          echo "virtualenvs.create: $config"
          if [ "$config" != "true" ]; then
            echo "FAIL: expected virtualenvs.create=true, got $config"
            exit 1
          fi
          echo "PASS"
      - name: Assert virtualenvs.in-project is false by default
        run: |
          config="$(poetry config virtualenvs.in-project)"
          echo "virtualenvs.in-project: $config"
          if [ "$config" != "false" ]; then
            echo "FAIL: expected virtualenvs.in-project=false, got $config"
            exit 1
          fi
          echo "PASS"
